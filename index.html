<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLS 4.0 — 54-Week Annual Program</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 12px; }

  /* Header */
  .header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .header h1 { font-size: 1.5em; color: #fff; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 0.85em; }

  .phase-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.75em;
    padding: 2px 12px;
    border-radius: 20px;
    margin-top: 8px;
    font-weight: 600;
  }
  .phase-badge.bulk { background: var(--orange); }

  .stats-bar {
    display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;
  }
  .stat {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; text-align: center; flex: 1; min-width: 80px;
  }
  .stat .num { font-size: 1.4em; font-weight: 700; color: var(--green); }
  .stat .label { font-size: 0.75em; color: var(--text-dim); }

  /* Week navigation */
  .week-nav {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .week-btn {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); cursor: pointer;
    font-size: 0.85em; transition: all 0.2s;
  }
  .week-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-btn.deload {
    border-color: var(--orange);
    color: var(--orange);
  }
  .week-btn.deload.active { background: var(--orange); color: #fff; }
  .week-btn.completed { border-color: var(--green); }
  .week-btn:hover { background: #1c2333; }

  /* Day card */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .day-card.completed-day { border-color: var(--green); opacity: 0.85; }
  .day-card.rest-day { border-color: var(--orange); }
  .day-card.deload-day { border-color: var(--orange); }
  .day-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; cursor: pointer;
  }
  .day-header h2 { font-size: 1.1em; color: #fff; }
  .day-header .day-type {
    font-size: 0.75em; padding: 2px 10px; border-radius: 20px;
    background: var(--accent); color: #fff; font-weight: 600;
  }
  .day-header .day-type.rest { background: var(--orange); }
  .day-header .day-type.deload { background: var(--orange); }
  .day-header .day-type.workout { background: var(--green); }
  .day-check { font-size: 1.3em; color: var(--text-dim); cursor: pointer; }
  .day-check.checked { color: var(--green); }

  /* Sections */
  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 0.85em; font-weight: 700; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px; letter-spacing: 0.5px;
  }

  /* Exercise item */
  .exercise-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .exercise-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
  }
  .exercise-name { font-weight: 600; color: #fff; font-size: 0.95em; }
  .exercise-specs { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
  .exercise-check { cursor: pointer; font-size: 1.1em; color: var(--text-dim); flex-shrink: 0; }
  .exercise-check.checked { color: var(--green); }

  /* Toggle for description */
  .desc-toggle {
    font-size: 0.8em; color: var(--accent); cursor: pointer;
    margin-top: 6px; display: inline-block;
  }
  .exercise-desc {
    display: none; margin-top: 8px; font-size: 0.85em;
    color: var(--text-dim); line-height: 1.5;
    border-top: 1px solid var(--border); padding-top: 8px;
  }
  .exercise-desc.show { display: block; }
  .exercise-desc a {
    color: var(--accent); text-decoration: none; font-weight: 500;
  }
  .exercise-desc a:hover { text-decoration: underline; }

  /* Set logging */
  .set-row {
    display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
    margin-top: 8px; font-size: 0.82em;
  }
  .set-row .set-label { color: var(--text-dim); font-weight: 600; margin-right: 2px; }
  .set-row input {
    width: 56px; padding: 3px 6px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--bg); color: var(--text);
    font-size: 0.85em; text-align: center;
  }
  .set-row .sep { color: var(--text-dim); margin: 0 2px; }

  /* RPE */
  .rpe-row {
    display: flex; gap: 6px; align-items: center; margin-top: 6px;
  }
  .rpe-row .rpe-label { font-size: 0.78em; color: var(--text-dim); }
  .rpe-pill {
    padding: 2px 10px; border-radius: 12px; font-size: 0.78em;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); user-select: none;
  }
  .rpe-pill.ez.selected { background: #1b3a1f; border-color: var(--green); color: var(--green); }
  .rpe-pill.ok.selected { background: #3d2e00; border-color: var(--orange); color: var(--orange); }
  .rpe-pill.hd.selected { background: #3d1115; border-color: var(--red); color: var(--red); }

  /* Nutrition section */
  .macro-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .macro-pill {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 0.85em;
  }
  .macro-pill .val { font-weight: 700; color: #fff; }
  .meal-list { list-style: none; }
  .meal-list li {
    padding: 6px 0; font-size: 0.82em; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
  }
  .meal-list li:last-child { border-bottom: none; }
  .meal-check { cursor: pointer; color: var(--text-dim); flex-shrink: 0; }
  .meal-check.checked { color: var(--green); }
  .meal-name { flex: 1; }
  .meal-cal { color: var(--text-dim); font-size: 0.85em; }

  /* Supplements */
  .supplement-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; font-size: 0.85em;
  }
  .supplement-item .check { cursor: pointer; color: var(--text-dim); flex-shrink: 0; }
  .supplement-item .check.checked { color: var(--green); }

  /* IO bar */
  .io-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .io-btn {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--accent); cursor: pointer;
    font-size: 0.82em; transition: all 0.2s;
  }
  .io-btn:hover { background: #1c2333; }
  #importInput { display: none; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--green); border-radius: 8px;
    padding: 10px 20px; font-size: 0.85em; color: var(--green);
    z-index: 100; transition: opacity 0.3s; opacity: 0; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Reset button */
  .reset-btn {
    display: block; width: 100%; padding: 12px;
    background: var(--card); border: 1px solid var(--red); border-radius: 8px;
    color: var(--red); cursor: pointer; font-size: 0.9em;
    margin-top: 16px; text-align: center;
  }
  .reset-btn:hover { background: #2d1215; }

  /* Supplements Guide Modal */
  .guide-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 200;
  }
  .guide-overlay.show { display: block; }
  .guide-panel {
    display: none; position: fixed; top: 0; right: 0; width: 90%; max-width: 460px;
    height: 100%; background: var(--card); border-left: 1px solid var(--border);
    z-index: 201; overflow-y: auto; padding: 20px;
    box-shadow: -4px 0 20px rgba(0,0,0,0.5);
  }
  .guide-panel.show { display: block; }
  .guide-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .guide-header h2 { color: #fff; font-size: 1.2em; }
  .guide-close {
    background: none; border: none; color: var(--text-dim); font-size: 1.5em;
    cursor: pointer; padding: 4px 8px;
  }
  .guide-close:hover { color: var(--text); }
  .guide-body .guide-supp {
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .guide-body .guide-supp:last-child { border-bottom: none; }
  .guide-supp h3 { color: #fff; font-size: 1em; margin-bottom: 4px; }
  .guide-supp .guide-cat { font-size: 0.75em; color: var(--text-dim); margin-bottom: 6px; }
  .guide-supp .guide-what,
  .guide-supp .guide-mech,
  .guide-supp .guide-note {
    font-size: 0.82em; color: var(--text); line-height: 1.5; margin-bottom: 6px;
  }
  .guide-supp .guide-label { font-weight: 600; color: var(--accent); }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .container { padding: 8px; }
    .header h1 { font-size: 1.2em; }
    .week-btn { padding: 6px 10px; font-size: 0.8em; }
    .day-card { padding: 12px; }
    .exercise-item { padding: 10px; }
    .set-row input { width: 48px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Bigger Leaner Stronger 4.0</h1>
    <div class="subtitle">54-Week Annual Program — Based on BLS 4.0 by Michael Matthews</div>
    <div class="phase-badge" id="headerPhaseBadge">Phase 1 — Cut</div>
    <div class="stats-bar">
      <div class="stat"><div class="num" id="statPct">0%</div><div class="label">Complete</div></div>
      <div class="stat"><div class="num" id="statDays">0/270</div><div class="label">Workout Days</div></div>
      <div class="stat"><div class="num" id="statStreak">0</div><div class="label">Week Streak</div></div>
    </div>
  </div>

  <div class="io-bar">
    <button class="io-btn" onclick="exportData()">Download Save</button>
    <button class="io-btn" onclick="document.getElementById('importInput').click()">Restore Save</button>
    <button class="io-btn" onclick="showGuide('supplements')">Supplements Guide</button>
    <button class="io-btn" onclick="showGuide('meals')">Meal Plans Guide</button>
    <input type="file" id="importInput" accept=".json" onchange="importData(event)">
  </div>

  <div class="week-nav" id="weekNav"></div>
  <div id="weekContent"></div>

  <button class="reset-btn" onclick="if(confirm('Reset ALL progress?')){localStorage.clear();location.reload()}">Reset All Progress</button>
</div>

<!-- Guide Modal (Supplements + Meals) -->
<div class="guide-overlay" id="guideOverlay" onclick="closeGuide()"></div>
<div class="guide-panel" id="guidePanel">
  <div class="guide-header">
    <h2 id="guideTitle">Guide</h2>
    <button class="guide-close" onclick="closeGuide()">&times;</button>
  </div>
  <div class="guide-body" id="guideBody"></div>
</div>

// ===== PHASE & WEEK STRUCTURE =====
// 6 phases × 9 weeks each (8 training + 1 deload) = 54 weeks
// Cut = Phases 1-2 (weeks 1-18), Bulk = Phases 3-6 (weeks 19-54)

const PHASES = [
  { phase: 1, label: "Phase 1", trainingWeeks: [1,2,3,4,5,6,7,8], deloadWeek: 9 },
  { phase: 2, label: "Phase 2", trainingWeeks: [10,11,12,13,14,15,16,17], deloadWeek: 18 },
  { phase: 3, label: "Phase 3", trainingWeeks: [19,20,21,22,23,24,25,26], deloadWeek: 27 },
  { phase: 4, label: "Phase 4", trainingWeeks: [28,29,30,31,32,33,34,35], deloadWeek: 36 },
  { phase: 5, label: "Phase 5", trainingWeeks: [37,38,39,40,41,42,43,44], deloadWeek: 45 },
  { phase: 6, label: "Phase 6", trainingWeeks: [46,47,48,49,50,51,52,53], deloadWeek: 54 }
];

function getPhaseForWeek(w) {
  for (const p of PHASES) {
    if (p.trainingWeeks.includes(w)) return { phase: p.phase, isDeload: false };
    if (p.deloadWeek === w) return { phase: p.phase, isDeload: true };
  }
  return null;
}

function getPhaseLabel(phaseNum) {
  const labels = {1: "Phase 1 — Cut", 2: "Phase 2 — Cut", 3: "Phase 3 — Bulk", 4: "Phase 4 — Bulk", 5: "Phase 5 — Bulk", 6: "Phase 6 — Bulk"};
  return labels[phaseNum] || "Phase " + phaseNum;
}

// Deload template
function getDeloadExercises(exercises) {
  return exercises.map(e => {
    const isCompound = e.reps === "4-6" || e.name.includes("Deadlift") || e.name.includes("Squat") || e.name.includes("Bench") || e.name.includes("Row") || e.name.includes("Press") || e.name.includes("Pull-Up") || e.name.includes("Chin") || e.name.includes("Dip");
    return {
      ...e,
      numSets: 2,
      reps: isCompound ? "2" : "4",
      rest: isCompound ? "3 min" : "2 min",
      isDeload: true,
      warmup: false
    };
  });
}

    what: "The evening meal, designed around lean protein + quality carbs + vegetables. The Cut version is lighter; the Bulk version adds a treat.",
    mechanism: "Pork tenderloin (Cut) is exceptionally lean while beef (Bulk) provides more iron and B vitamins. Brown rice (Cut) provides low-GI carbs for sustained overnight energy. The Bulk includes a small dessert (dairy-free ice cream) to hit the higher calorie target without excessive volume.",
    note: "Cut: Pork tenderloin + brown rice + broccoli + bell peppers + soy sauce. Finish with 50g gummy bears for a controlled carb bump. Bulk: Hamburger bun + 95% lean beef + tomato/lettuce + ketchup + dairy-free ice cream. The beef burger satisfies cravings while staying on plan."
  },
  {
    name: "Pre-Bed Shake",
    cat: "Bulk Only",
    what: "A slow-digesting protein shake taken before sleep to maintain a positive nitrogen balance through the overnight fast.",
    mechanism: "Casein protein forms a gel in the stomach, releasing amino acids steadily over 6-8 hours. Combined with high-carb fruit (pineapple), this prevents overnight muscle breakdown and keeps MPS elevated through the night. Only used during Bulk — Cut macros don't allow the extra calories.",
    note: "1.5 scoops casein + 240ml soy milk + 385g pineapple. The pineapple provides digestive enzymes (bromelain) and fast-digesting carbs that don't disturb sleep. Can substitute casein with soy protein isolate if dairy sensitivity is a concern."
  }
];

// ===== APP STATE =====
const STORAGE_KEY = "bls40_progress";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { exercises: {}, meals: {}, supplements: {}, days: {}, sets: {}, rpe: {}, calories: {} };
  } catch { return { exercises: {}, meals: {}, supplements: {}, days: {}, sets: {}, rpe: {}, calories: {} }; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function getStorage() {
  const p = loadProgress();
  if (!p.bw) { p.bw = USER_BW; }
  return p;
}

// ===== RENDER =====
let currentWeek = 1;

function makeId(prefix, ...parts) {
  return prefix + "_" + parts.join("_").replace(/[^a-z0-9]/gi, "_");
}

function getWeekData(weekNum) {
  const pinfo = getPhaseForWeek(weekNum);
  if (!pinfo) return null;
  const { phase, isDeload } = pinfo;
  const days = [];

  for (let d = 0; d < 7; d++) {
    if (d === 1) { // Tuesday rest
      const restPlan = phase <= 2 ? MEAL_CUT : MEAL_BULK;
      days.push({
        dayName: DAY_NAMES[d], dayOfWeek: d, type: "rest", title: "Rest Day",
        exercises: [], plan: restPlan, phase: phase, isDeload: false
      });
      continue;
    }
    if (d === 6) { // Sunday rest
      const restPlan = phase <= 2 ? MEAL_CUT : MEAL_BULK;
      days.push({
        dayName: DAY_NAMES[d], dayOfWeek: d, type: "rest", title: "Rest / Active Recovery",
        exercises: [], plan: restPlan, phase: phase, isDeload: false
      });
      continue;
    }

    // Workout day
    const phEx = PHASE_EXERCISES[phase];
    const dayNames = {0: "Push", 2: "Pull", 3: "Upper Body A", 5: "Legs", 6: "Upper Body B"};
    const title = dayNames[d] || "Workout";
    let exercises = phEx && phEx[d] ? [...phEx[d]] : [];

    if (isDeload && exercises.length > 0) {
      exercises = getDeloadExercises(exercises);
    }

    const plan = phase <= 2 ? MEAL_CUT : MEAL_BULK;

    days.push({
      dayName: DAY_NAMES[d], dayOfWeek: d, type: isDeload ? "deload" : "workout",
      title: isDeload ? `Deload — ${title}` : title,
      exercises, plan, phase, isDeload
    });
  }
  return { week: weekNum, phase, isDeload, days };
}

function render() {
  const p = getStorage();
  const bw = p.bw || USER_BW;

  // Phase badge
  const pinfo = getPhaseForWeek(currentWeek);
  const phaseLabel = pinfo ? getPhaseLabel(pinfo.phase) : "";
  const badge = document.getElementById("headerPhaseBadge");
  badge.textContent = phaseLabel;
  badge.className = "phase-badge" + (pinfo && pinfo.phase >= 3 ? " bulk" : "");

  // Week nav
  const nav = document.getElementById("weekNav");
  nav.innerHTML = "";
  for (let w = 1; w <= 54; w++) {
    const btn = document.createElement("button");
    const wp = getPhaseForWeek(w);
    btn.className = "week-btn" + (w === currentWeek ? " active" : "") + (wp && wp.isDeload ? " deload" : "");
    if (!(wp && wp.isDeload)) {
      let allDone = true;
      for (let d = 0; d < 7; d++) {
        if (!p.days[makeId("day", w, d)]) { allDone = false; break; }
      }
      if (allDone) btn.className += " completed";
    }
    btn.textContent = "W" + w;
    btn.onclick = () => { currentWeek = w; render(); };
    nav.appendChild(btn);
  }

  // Content
  const content = document.getElementById("weekContent");
  content.innerHTML = "";

  const week = getWeekData(currentWeek);
  if (!week) { content.innerHTML = "<p>No data for this week.</p>"; return; }

  // Phase info bar
  const phaseDesc = {
    1: "Phase 1 — Cut (4-6 rep range, Bench/Deadlift focus)",
    2: "Phase 2 — Cut (Exercise rotation, Front Squats + Bulgarian Split Squats)",
    3: "Phase 3 — Bulk (Standing OHP, Barbell Row return)",
    4: "Phase 4 — Bulk (Arnold Press, Pull-ups, Hammer Curls)",
    5: "Phase 5 — Bulk (Phase 1 rotation return, Bench/Deadlift focus)",
    6: "Phase 6 — Bulk (Phase 2 rotation return, accessories focus)"
  };
  const infoBar = document.createElement("div");
  infoBar.style.cssText = "text-align:center;margin-bottom:12px;font-size:0.85em;color:var(--text-dim);padding:8px;background:var(--card);border-radius:8px;border:1px solid var(--border);";
  const mealPlanLabel = week.phase <= 2 ? "Cut — 2309 cal • P227g • C237g • F50g" : "Bulk (Lean Gain) — 3351 cal • P213g • C475g • F80g";
  infoBar.innerHTML = `<strong>${phaseDesc[week.phase] || "Phase " + week.phase}</strong><br><span style="font-size:0.9em;color:var(--orange)">Meal Plan: ${mealPlanLabel}</span>`;
  if (week.isDeload) {
    infoBar.innerHTML += '<br><span style="color:var(--orange);font-weight:600">DELOAD WEEK — Reduce weights by 10-15%, focus on technique</span>';
  }
  content.appendChild(infoBar);

  for (const day of week.days) {
    const card = document.createElement("div");
    const dayKey = makeId("day", currentWeek, day.dayOfWeek);
    card.className = "day-card" + (p.days[dayKey] ? " completed-day" : "")
      + (day.type === "rest" ? " rest-day" : "")
      + (day.type === "deload" ? " deload-day" : "");

    // Header
    const hdr = document.createElement("div");
    hdr.className = "day-header";
    hdr.innerHTML = `
      <div>
        <h2>${day.dayName} — ${day.title}</h2>
      </div>
      <div>
        <span class="day-type ${day.type}">${day.type === "rest" ? "REST" : day.type === "deload" ? "DELOAD" : "WORKOUT"}</span>
        <span class="day-check ${p.days[dayKey] ? "checked" : ""}" data-key="${dayKey}" data-type="day">${p.days[dayKey] ? "✓" : "○"}</span>
      </div>
    `;
    card.appendChild(hdr);

    // Exercises
    if (day.exercises.length > 0) {
      const sec = document.createElement("div");
      sec.className = "section";
      const secTitle = document.createElement("div");
      secTitle.className = "section-title";
      secTitle.textContent = "Exercises";
      sec.appendChild(secTitle);

      // Warm-up note (only for non-deload)
      if (!day.isDeload && day.exercises.some(e => e.warmup)) {
        const warmNote = document.createElement("div");
        warmNote.style.cssText = "font-size:0.78em;color:var(--orange);margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);";
        warmNote.innerHTML = "Warm-up: 12 reps @50% • 10 reps @50% • 4 reps @70% • 1 rep @90% • Then working sets";
        sec.appendChild(warmNote);
      }

      day.exercises.forEach(ex => {
        const item = document.createElement("div");
        item.className = "exercise-item";
        const exKey = makeId("ex", currentWeek, day.dayOfWeek, ex.name.replace(/[^a-z0-9]/gi, "_"));

        item.innerHTML = `
          <div class="exercise-header">
            <div>
              <div class="exercise-name">${ex.name}${ex.isDeload ? ' (Deload)' : ''}</div>
              <div class="exercise-specs">${ex.numSets} x ${ex.reps} • Rest ${ex.rest}</div>
            </div>
            <span class="exercise-check ${p.exercises[exKey] ? "checked" : ""}" data-key="${exKey}" data-type="exercise">${p.exercises[exKey] ? "✓" : "○"}</span>
          </div>
          <div class="set-row">
            <span class="set-label">S1</span>
            <input type="number" min="0" step="1.25" placeholder="kg" value="${p.sets[exKey+'_s1_w']||''}" data-set="${exKey}_s1_w" data-settype="weight">
            <span class="sep">×</span>
            <input type="number" min="0" step="1" placeholder="rep" value="${p.sets[exKey+'_s1_r']||''}" data-set="${exKey}_s1_r" data-settype="reps" style="width:44px">
            <span class="set-label">S2</span>
            <input type="number" min="0" step="1.25" placeholder="kg" value="${p.sets[exKey+'_s2_w']||''}" data-set="${exKey}_s2_w" data-settype="weight">
            <span class="sep">×</span>
            <input type="number" min="0" step="1" placeholder="rep" value="${p.sets[exKey+'_s2_r']||''}" data-set="${exKey}_s2_r" data-settype="reps" style="width:44px">
            <span class="set-label">S3</span>
            <input type="number" min="0" step="1.25" placeholder="kg" value="${p.sets[exKey+'_s3_w']||''}" data-set="${exKey}_s3_w" data-settype="weight">
            <span class="sep">×</span>
            <input type="number" min="0" step="1" placeholder="rep" value="${p.sets[exKey+'_s3_r']||''}" data-set="${exKey}_s3_r" data-settype="reps" style="width:44px">
          </div>
          <div class="rpe-row">
            <span class="rpe-label">Intensity:</span>
            <span class="rpe-pill ez ${p.rpe[exKey] === 'ez' ? 'selected' : ''}" data-rpe="${exKey}" data-rpeval="ez">EZ</span>
            <span class="rpe-pill ok ${p.rpe[exKey] === 'ok' ? 'selected' : ''}" data-rpe="${exKey}" data-rpeval="ok">OK</span>
            <span class="rpe-pill hd ${p.rpe[exKey] === 'hd' ? 'selected' : ''}" data-rpe="${exKey}" data-rpeval="hd">HD</span>
          </div>
          <span class="desc-toggle" data-ex="${ex.name}">Show description »</span>
          <div class="exercise-desc" data-ex="${ex.name}">
            ${EXERCISES[ex.name] ? EXERCISES[ex.name].desc : "Perform with proper form: controlled negative, explosive positive. Full range of motion."}
            ${EXERCISES[ex.name] && EXERCISES[ex.name].img
              ? `<br><a href="${EXERCISES[ex.name].img}" target="_blank">View: ${EXERCISES[ex.name].imgLabel}</a>`
              : ""}
          </div>
        `;
        sec.appendChild(item);
      });
      card.appendChild(sec);
    }

    // Nutrition
    if (day.plan) {
      const sec = document.createElement("div");
      sec.className = "section";
      const planLabel = week.phase <= 2 ? "CUT" : "BULK (LEAN GAIN)";
      sec.innerHTML = `<div class="section-title">Nutrition — ${planLabel} (${day.plan.macros.cals} CAL/DAY)</div>`;
      const macroRow = document.createElement("div");
      macroRow.className = "macro-row";
      macroRow.innerHTML = `
        <span class="macro-pill">Protein <span class="val">${day.plan.macros.protein}g</span></span>
        <span class="macro-pill">Carbs <span class="val">${day.plan.macros.carbs}g</span></span>
        <span class="macro-pill">Fat <span class="val">${day.plan.macros.fat}g</span></span>
        <span class="macro-pill">Calories <span class="val">${day.plan.macros.cals}</span></span>
      `;
      sec.appendChild(macroRow);

      // Calorie tracker
      const calKey = makeId("cal", currentWeek, day.dayOfWeek);
      const calDiv = document.createElement("div");
      calDiv.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:0.85em;";
      calDiv.innerHTML = `
        <span style="color:var(--text-dim)">Target:</span>
        <span style="font-weight:700;color:var(--green)">${day.plan.macros.cals} cal</span>
        <span style="color:var(--text-dim);margin-left:4px">Actual:</span>
        <input type="number" min="0" step="1" placeholder="0"
          style="width:80px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:0.95em;text-align:center"
          value="${p.calories[calKey] || ""}"
          data-calorie="${calKey}">
      `;
      sec.appendChild(calDiv);

      const mealList = document.createElement("ul");
      mealList.className = "meal-list";

      const mealTitles = ["Pre-Workout", "Breakfast (post-workout)", "Lunch", "Snack", "Dinner", "Pre-Bed Shake"];

      day.plan.meals.forEach((meal, i) => {
        const mealKey = makeId("meal", currentWeek, day.dayOfWeek, i);
        const li = document.createElement("li");
        
        // Handle options-style meals (breakfast A/B)
        let mealHtml = "";
        if (typeof meal === "object" && meal.options) {
          mealHtml = `<strong>${meal.title}:</strong><br style="margin-bottom:2px">` + meal.options.map((opt, oi) => {
            const optKey = mealKey + "_opt" + oi;
            const checked = p.meals[optKey] ? "checked" : "";
            const symbol = p.meals[optKey] ? "✓" : "○";
            return `<span style="display:flex;align-items:flex-start;gap:6px;margin-top:2px">
              <span class="meal-check ${checked}" style="flex-shrink:0" data-key="${optKey}" data-type="meal">${symbol}</span>
              <span>${opt}</span>
            </span>`;
          }).join("");
        } else {
          mealHtml = `<strong>${mealTitles[i] || "Meal " + (i+1)}:</strong> ${meal}`;
        }

        li.innerHTML = `
          <span class="meal-check ${p.meals[mealKey] ? "checked" : ""}" data-key="${mealKey}" data-type="meal" style="flex-shrink:0">${p.meals[mealKey] ? "✓" : "○"}</span>
          <span class="meal-name">${mealHtml}</span>
        `;
        mealList.appendChild(li);
      });

      sec.appendChild(mealList);
      card.appendChild(sec);
    }

    // Supplements
    const supps = day.type === "rest" ? SUPPLEMENTS_REST : SUPPLEMENTS_DAILY;
    if (supps.length > 0) {
      const sec = document.createElement("div");
      sec.className = "section";
      sec.innerHTML = `<div class="section-title">Supplements</div>`;
      supps.forEach(s => {
        const suppKey = makeId("supp", currentWeek, day.dayOfWeek, s.name.replace(/[^a-z0-9]/gi, "_"));
        const div = document.createElement("div");
        div.className = "supplement-item";
        div.innerHTML = `
          <span class="check ${p.supplements[suppKey] ? "checked" : ""}" data-key="${suppKey}" data-type="supplement">${p.supplements[suppKey] ? "✓" : "○"}</span>
          <span><strong>${s.name}</strong> — ${s.dose}</span>
        `;
        sec.appendChild(div);
      });

      if (day.type !== "rest") {
        const note = document.createElement("div");
        note.style.cssText = "font-size:0.78em;color:var(--text-dim);margin-top:6px;padding:6px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);";
        note.innerHTML = "Take creatine in your pre-workout shake. No need to cycle — 5g daily.";
        sec.appendChild(note);
      }
      card.appendChild(sec);
    }

    content.appendChild(card);
  }

  updateStats();
  attachListeners();
}

function updateStats() {
  const p = getStorage();

  // Count completed workout days (not rest days)
  const totalWorkoutDays = 54 * 5; // 54 weeks × 5 workout days
  let doneDays = 0;
  for (let w = 1; w <= 54; w++) {
    for (let d of [0, 2, 3, 5, 6]) { // Mon, Wed, Thu, Fri, Sat
      if (p.days[makeId("day", w, d)]) doneDays++;
    }
  }
  document.getElementById("statDays").textContent = doneDays + "/" + totalWorkoutDays;

  // Percentage complete
  const totalChecks = 54 * 7; // all day cards
  let doneChecks = Object.keys(p.days).length;
  const pct = Math.round(doneChecks / totalChecks * 100);
  document.getElementById("statPct").textContent = pct + "%";

  // Week Streak: consecutive completed weeks from week 1
  let streak = 0;
  for (let w = 1; w <= 54; w++) {
    let allDaysDone = true;
    for (let d = 0; d < 7; d++) {
      if (!p.days[makeId("day", w, d)]) { allDaysDone = false; break; }
    }
    if (allDaysDone) streak++; else break;
  }
  document.getElementById("statStreak").textContent = streak;
}

function attachListeners() {
  document.querySelectorAll("[data-type]").forEach(el => {
    el.removeEventListener("click", handleCheck);
    el.addEventListener("click", handleCheck);
  });
  document.querySelectorAll(".desc-toggle").forEach(el => {
    el.removeEventListener("click", handleDescToggle);
    el.addEventListener("click", handleDescToggle);
  });
  document.querySelectorAll("[data-set]").forEach(el => {
    el.removeEventListener("change", handleSetChange);
    el.addEventListener("change", handleSetChange);
  });
  document.querySelectorAll("[data-rpe]").forEach(el => {
    el.removeEventListener("click", handleRpeClick);
    el.addEventListener("click", handleRpeClick);
  });
  document.querySelectorAll("[data-calorie]").forEach(el => {
    el.removeEventListener("change", handleCalorieChange);
    el.addEventListener("change", handleCalorieChange);
  });
}

function handleCheck(e) {
  const el = e.currentTarget;
  const key = el.dataset.key;
  const type = el.dataset.type;
  const p = getStorage();

  let target;
  if (type === "exercise") target = p.exercises;
  else if (type === "meal") target = p.meals;
  else if (type === "supplement") target = p.supplements;
  else target = p.days;

  target[key] = !target[key];
  saveProgress(p);
  el.classList.toggle("checked");
  el.textContent = target[key] ? "✓" : "○";

  if (type === "day") {
    const card = el.closest(".day-card");
    if (card) card.classList.toggle("completed-day");
  }
  updateStats();
}

function handleDescToggle(e) {
  const exName = e.currentTarget.dataset.ex;
  const desc = document.querySelector(`.exercise-desc[data-ex="${CSS.escape(exName)}"]`);
  if (desc) {
    desc.classList.toggle("show");
    e.currentTarget.textContent = desc.classList.contains("show") ? "Hide description »" : "Show description »";
  }
}

function handleSetChange(e) {
  const el = e.currentTarget;
  const key = el.dataset.set;
  const val = el.value;
  const p = getStorage();
  p.sets[key] = val;
  saveProgress(p);
}

function handleRpeClick(e) {
  const el = e.currentTarget;
  const key = el.dataset.rpe;
  const val = el.dataset.rpeval;
  const p = getStorage();

  if (p.rpe[key] === val) {
    delete p.rpe[key];
    document.querySelectorAll(`[data-rpe="${key}"]`).forEach(b => b.classList.remove("selected"));
  } else {
    p.rpe[key] = val;
    document.querySelectorAll(`[data-rpe="${key}"]`).forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
  }
  saveProgress(p);
}

function handleCalorieChange(e) {
  const el = e.currentTarget;
  const key = el.dataset.calorie;
  const val = el.value;
  const p = getStorage();
  if (val) {
    p.calories[key] = parseInt(val, 10) || 0;
  } else {
    delete p.calories[key];
  }
  saveProgress(p);
}

// Lightbox for images
document.addEventListener("click", function(e) {
  if (e.target.tagName === "A" && e.target.href && e.target.href.includes("images/")) {
    e.preventDefault();
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;";
    const img = document.createElement("img");
    img.src = e.target.href;
    img.style.cssText = "max-width:95%;max-height:95%;border-radius:8px;";
    overlay.appendChild(img);
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
  }
});

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = localStorage.getItem(STORAGE_KEY);
  const blob = new Blob([data], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "bls-program-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Progress saved to file");
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showToast("Progress restored successfully");
      render();
    } catch (err) {
      showToast("Error: Invalid file");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function showToast(msg) {
  const el = document.getElementById("toast");
  if (!el) return;
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

// ===== GUIDE MODAL (Supplements + Meals) =====
function showGuide(type) {
  const body = document.getElementById("guideBody");
  const title = document.getElementById("guideTitle");
  let html = "";
  if (type === "supplements") {
    title.textContent = "Supplements Guide";
    for (const s of SUPPLEMENTS_GUIDE) {
      html += `<div class="guide-supp">
        <h3>${s.name}</h3>
        <div class="guide-cat">${s.cat}</div>
        <div class="guide-what"><span class="guide-label">What it is:</span> ${s.what}</div>
        <div class="guide-mech"><span class="guide-label">How it works:</span> ${s.mechanism}</div>
        <div class="guide-note"><span class="guide-label">Notes:</span> ${s.note}</div>
      </div>`;
    }
  } else {
    title.textContent = "Meal Plans Guide";
    for (const m of MEALS_GUIDE) {
      html += `<div class="guide-supp">
        <h3>${m.name}</h3>
        <div class="guide-cat">${m.cat}</div>
        <div class="guide-what"><span class="guide-label">What it is:</span> ${m.what}</div>
        <div class="guide-mech"><span class="guide-label">How it works:</span> ${m.mechanism}</div>
        <div class="guide-note"><span class="guide-label">Notes:</span> ${m.note}</div>
      </div>`;
    }
  }
  body.innerHTML = html;
  document.getElementById("guideOverlay").classList.add("show");
  document.getElementById("guidePanel").classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeGuide() {
  document.getElementById("guideOverlay").classList.remove("show");
  document.getElementById("guidePanel").classList.remove("show");
  document.body.style.overflow = "";
}

render();
</script>
