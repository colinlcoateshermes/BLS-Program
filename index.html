<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLS 4.0 — 20-Week Cut & Bulk</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 12px; }

  /* Header */
  .header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .header h1 { font-size: 1.5em; color: #fff; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 0.85em; margin-bottom: 4px; }
  .header .phase-badge {
    display: inline-block; font-size: 0.75em; padding: 2px 10px; border-radius: 20px;
    background: var(--purple); color: #fff; font-weight: 600; margin-top: 4px;
  }
  .stats-bar {
    display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;
  }
  .stat {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; text-align: center; flex: 1; min-width: 80px;
  }
  .stat .num { font-size: 1.4em; font-weight: 700; color: var(--green); }
  .stat .label { font-size: 0.75em; color: var(--text-dim); }

  /* Import / Export bar */
  .io-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .io-btn {
    flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--accent); cursor: pointer;
    font-size: 0.85em; text-align: center; transition: all 0.2s; min-width: 80px;
  }
  .io-btn:hover { background: #1c2333; }
  #importInput { display: none; }

  /* Week navigation */
  .week-nav {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .week-btn {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); cursor: pointer;
    font-size: 0.85em; transition: all 0.2s;
  }
  .week-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-btn.completed { border-color: var(--green); }
  .week-btn:hover { background: #1c2333; }
  .week-btn.deload {
    border-color: var(--orange); color: var(--orange);
  }
  .week-btn.deload.active { background: var(--orange); color: #fff; }

  /* Day card */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .day-card.completed-day { border-color: var(--green); opacity: 0.85; }
  .day-card.rest-day { border-color: var(--orange); }
  .day-card.deload-day { border-color: var(--orange); }
  .day-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; cursor: pointer;
  }
  .day-header h2 { font-size: 1.1em; color: #fff; }
  .day-header .day-type {
    font-size: 0.75em; padding: 2px 10px; border-radius: 20px;
    background: var(--accent); color: #fff; font-weight: 600;
  }
  .day-header .day-type.rest { background: var(--orange); }
  .day-header .day-type.workout { background: var(--green); }
  .day-header .day-type.deload { background: var(--orange); }
  .day-check { font-size: 1.3em; color: var(--text-dim); cursor: pointer; }
  .day-check.checked { color: var(--green); }

  /* Sections */
  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 0.85em; font-weight: 700; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px; letter-spacing: 0.5px;
  }

  /* Exercise item */
  .exercise-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .exercise-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
  }
  .exercise-name { font-weight: 600; color: #fff; font-size: 0.95em; }
  .exercise-specs { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
  .exercise-check { cursor: pointer; font-size: 1.1em; color: var(--text-dim); flex-shrink: 0; }
  .exercise-check.checked { color: var(--green); }

  /* Set logging row */
  .set-log {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
  }
  .set-row-label { font-size: 0.78em; color: var(--text-dim); margin-right: 4px; }
  .set-input {
    width: 55px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text); font-size: 0.85em; text-align: center;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--text-dim); font-size: 0.8em; }
  .set-x { color: var(--text-dim); font-size: 0.8em; }
  .set-block {
    display: flex; align-items: center; gap: 4px;
  }

  /* RPE / Traffic Light */
  .rpe-row {
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
  }
  .rpe-label { font-size: 0.78em; color: var(--text-dim); margin-right: 4px; }
  .rpe-dot {
    display: inline-block; width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer; text-align: center;
    line-height: 24px; font-size: 0.75em; font-weight: 700; transition: all 0.15s;
    background: var(--bg); color: var(--text-dim);
  }
  .rpe-dot.easy { border-color: var(--green); }
  .rpe-dot.easy.selected { background: var(--green); color: #fff; }
  .rpe-dot.medium { border-color: var(--orange); }
  .rpe-dot.medium.selected { background: var(--orange); color: #fff; }
  .rpe-dot.hard { border-color: var(--red); }
  .rpe-dot.hard.selected { background: var(--red); color: #fff; }

  /* Toggle for description */
  .desc-toggle {
    font-size: 0.8em; color: var(--accent); cursor: pointer;
    margin-top: 6px; display: inline-block;
  }
  .exercise-desc {
    display: none; margin-top: 8px; font-size: 0.85em;
    color: var(--text-dim); line-height: 1.5;
    border-top: 1px solid var(--border); padding-top: 8px;
  }
  .exercise-desc.show { display: block; }
  .exercise-desc a {
    color: var(--accent); text-decoration: none; font-weight: 500;
  }
  .exercise-desc a:hover { text-decoration: underline; }

  /* Nutrition section */
  .macro-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .macro-pill {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 0.85em;
  }
  .macro-pill .val { font-weight: 700; color: #fff; }
  .meal-list { list-style: none; }
  .meal-list li {
    padding: 6px 0; font-size: 0.85em; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
  }
  .meal-list li:last-child { border-bottom: none; }
  .meal-check { cursor: pointer; color: var(--text-dim); flex-shrink: 0; }
  .meal-check.checked { color: var(--green); }
  .meal-name { flex: 1; }
  .meal-cal { color: var(--text-dim); font-size: 0.85em; flex-shrink: 0; }

  /* Supplements */
  .supplement-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; font-size: 0.85em;
  }
  .supplement-item .check { cursor: pointer; color: var(--text-dim); flex-shrink: 0; }
  .supplement-item .check.checked { color: var(--green); }

  /* Supplements Guide Modal */
  .guide-overlay {
    display: none; position: fixed; inset: 0; z-index: 998;
    background: rgba(0,0,0,0.7);
  }
  .guide-overlay.show { display: block; }
  .guide-panel {
    position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px;
    height: 100%; z-index: 999; overflow-y: auto;
    background: var(--bg); transition: right 0.3s ease;
    border-left: 1px solid var(--border);
  }
  .guide-panel.show { right: 0; }
  .guide-header {
    position: sticky; top: 0; z-index: 2;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .guide-header h2 { font-size: 1.1em; color: #fff; margin: 0; }
  .guide-close {
    font-size: 1.5em; cursor: pointer; color: var(--text-dim); line-height: 1;
    background: none; border: none; padding: 4px 8px;
  }
  .guide-close:hover { color: var(--text); }
  .guide-body { padding: 12px 16px 24px; }
  .guide-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 12px;
  }
  .guide-card h3 { font-size: 1em; color: #fff; margin-bottom: 4px; }
  .guide-card .guide-category {
    font-size: 0.75em; color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .guide-card .guide-section-title {
    font-size: 0.8em; color: var(--text-dim); font-weight: 700;
    margin-top: 8px; margin-bottom: 2px;
  }
  .guide-card p { font-size: 0.85em; color: var(--text); line-height: 1.6; margin-bottom: 4px; }
  .guide-card .guide-note {
    font-size: 0.78em; color: var(--orange); margin-top: 6px;
    padding: 6px 10px; background: var(--bg); border-radius: 6px;
    border: 1px solid var(--border);
  }
  .guide-card .dose-badge {
    display: inline-block; font-size: 0.8em; color: var(--green);
    background: var(--bg); border: 1px solid var(--green); border-radius: 6px;
    padding: 2px 8px; margin-bottom: 6px;
  }

  /* Reset button */
  .reset-btn {
    display: block; width: 100%; padding: 12px;
    background: var(--card); border: 1px solid var(--red); border-radius: 8px;
    color: var(--red); cursor: pointer; font-size: 0.9em;
    margin-top: 16px; text-align: center;
  }
  .reset-btn:hover { background: #2d1215; }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--green); border-radius: 8px;
    padding: 10px 20px; color: var(--green); font-size: 0.85em;
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .container { padding: 8px; }
    .header h1 { font-size: 1.2em; }
    .week-btn { padding: 6px 10px; font-size: 0.8em; }
    .day-card { padding: 12px; }
    .exercise-item { padding: 10px; }
    .set-input { width: 48px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Bigger Leaner Stronger 4.0</h1>
    <div class="subtitle">20-Week Cut &amp; Bulk — Based on BLS 4.0 by Michael Matthews</div>
    <div class="phase-badge" id="headerPhaseBadge">Phase 1 — Cut</div>
    <div class="stats-bar">
      <div class="stat"><div class="num" id="statPct">0%</div><div class="label">Complete</div></div>
      <div class="stat"><div class="num" id="statDays">0/20</div><div class="label">Weeks Done</div></div>
      <div class="stat"><div class="num" id="statStreak">0</div><div class="label">Week Streak</div></div>
    </div>
  </div>

  <div class="io-bar">
    <button class="io-btn" onclick="exportData()">Download Save</button>
    <button class="io-btn" onclick="document.getElementById('importInput').click()">Restore Save</button>
    <button class="io-btn" onclick="showSupplementsGuide()">Supplements Guide</button>
    <input type="file" id="importInput" accept=".json" onchange="importData(event)">
  </div>

  <div class="week-nav" id="weekNav"></div>
  <div id="weekContent"></div>

  <button class="reset-btn" onclick="if(confirm('Reset ALL progress?')){localStorage.clear();location.reload()}">Reset All Progress</button>
</div>
<div class="toast" id="toast"></div>

<!-- Supplements Guide Modal -->
<div class="guide-overlay" id="guideOverlay" onclick="closeSupplementsGuide()"></div>
<div class="guide-panel" id="guidePanel">
  <div class="guide-header">
    <h2>Supplements Guide</h2>
    <button class="guide-close" onclick="closeSupplementsGuide()">&times;</button>
  </div>
  <div class="guide-body" id="guideBody"></div>
</div>

<script>
// ===== PHASE & WEEK STRUCTURE =====
// 4 phases × 5 weeks each (4 training + 1 deload) = 20 weeks
// Cut = Phases 1-2 (weeks 1-10), Bulk = Phases 3-4 (weeks 11-20)

const PHASES = [
  { phase: 1, label: "Phase 1", trainingWeeks: [1,2,3,4], deloadWeek: 5 },
  { phase: 2, label: "Phase 2", trainingWeeks: [6,7,8,9], deloadWeek: 10 },
  { phase: 3, label: "Phase 3", trainingWeeks: [11,12,13,14], deloadWeek: 15 },
  { phase: 4, label: "Phase 4", trainingWeeks: [16,17,18,19], deloadWeek: 20 }
];

const TOTAL_WEEKS = 20;
const DAY_NAMES = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

function getPhaseForWeek(w) {
  for (const p of PHASES) {
    if (p.trainingWeeks.includes(w)) return { phase: p.phase, isDeload: false };
    if (p.deloadWeek === w) return { phase: p.phase, isDeload: true };
  }
  return { phase: 1, isDeload: false };
}

function getPhaseLabel(phaseNum) {
  const labels = {1: "Phase 1 — Cut", 2: "Phase 2 — Cut", 3: "Phase 3 — Bulk", 4: "Phase 4 — Bulk"};
  return labels[phaseNum] || "Phase " + phaseNum;
}

function isCutWeek(w) { return w <= 10; }
function isBulkWeek(w) { return w > 10; }

// ===== MEAL PLANS (official BLS 4.0) =====

const BULK_MEALS = {
  macros: { cals: 3351, protein: 210, carbs: 470, fat: 77 },
  meals: [
    {
      name: "Breakfast",
      items: "250g Skyr/Greek yogurt (2%), 220g mixed berries, 65g granola, cinnamon/nutmeg, 2 tbsp half-and-half, 10g sugar (coffee)",
      detail: "682 cal | 34P 99C 19F"
    },
    {
      name: "Lunch",
      items: "1 large flour tortilla (71g), 130g chicken breast, 150g refried beans, 30g dry brown rice, 30g low-fat cheddar, 100g tomato, 100g onion, 30g avocado, Sriracha",
      detail: "822 cal | 53P 99C 25F"
    },
    {
      name: "Snack",
      items: "1 scoop whey isolate, 240ml rice milk, 2 slices whole-grain bread, 20g peanut butter, 45g jam",
      detail: "694 cal | 39P 97C 18F"
    },
    {
      name: "Dinner",
      items: "150g sirloin (trimmed fat), 360g sweet potato, 150g green beans, 150g carrots, cooking spray, 2 tbsp BBQ sauce",
      detail: "696 cal | 43P 111C 9F"
    },
    {
      name: "Pre-Bed Shake",
      items: "1.5 scoops casein protein, 240ml rice milk, 150g banana (1 extra large)",
      detail: "457 cal | 41P 64C 6F"
    }
  ]
};

// ===== EXERCISE DESCRIPTIONS =====

const EXERCISES = {

// For deload weeks, we use the same exercises but lower volume
// Compounds: 2 sets of 2 reps, Accessories: 2 sets of 4 reps
function getDeloadExercises(baseExercises) {
  return baseExercises.map(ex => {
    const isCompound = ex.warmup || parseInt(ex.reps) <= 6;
    return {
      ...ex,
      numSets: 2,
      reps: isCompound ? "2" : "4",
      rest: "2 min",
      warmup: ex.warmup ? true : false
    };
  });
}

// Get training exercises for a specific week
function getTrainingExercises(weekNum, dayOfWeek) {
  const info = getPhaseForWeek(weekNum);

  // Find which base week to use for this phase
  let baseWeek;
  if (info.phase === 1) baseWeek = 1;
  else if (info.phase === 2) baseWeek = 6;
  else if (info.phase === 3) baseWeek = 11;
  else if (info.phase === 4) baseWeek = 16;

  const weekWorkout = WORKOUTS[baseWeek];
  if (!weekWorkout) return [];

  const dayKey = String(dayOfWeek);
  const baseExercises = weekWorkout[dayKey] || [];
  return baseExercises;
}

function getExercisesForDay(weekNum, dayOfWeek) {
  const info = getPhaseForWeek(weekNum);
  const baseExercises = getTrainingExercises(weekNum, dayOfWeek);

  if (info.isDeload) {
    return getDeloadExercises(baseExercises);
  }
  return baseExercises;
}

// ===== WEEK DATA GENERATOR =====

function getWorkoutTitle(dayOfWeek) {
  const titles = {
    0: "Push",
    2: "Pull",
    3: "Upper Body A",
    4: "Legs",
    5: "Upper Body B"
  };
  return titles[dayOfWeek] || "Rest";
}

function getDayData(weekNum, dayOfWeek) {
  const isRest = (dayOfWeek === 1 || dayOfWeek === 6);
  const isWorkout = !isRest;
  const info = getPhaseForWeek(weekNum);

  const meals = isCutWeek(weekNum) ? CUT_MEALS : BULK_MEALS;
  const nutMacros = meals.macros;

  if (isRest) {
    return {
      dayName: DAY_NAMES[dayOfWeek],
      dayOfWeek: dayOfWeek,
      type: "rest",
      title: dayOfWeek === 1 ? "Rest Day" : "Rest / Active Recovery",
      exercises: [],
      nutrition: {
        macros: nutMacros,
        meals: meals.meals
      },
      supplements: SUPPLEMENTS_REST,
      isDeload: false
    };
  }

  const exercises = getExercisesForDay(weekNum, dayOfWeek);

  return {
    dayName: DAY_NAMES[dayOfWeek],
    dayOfWeek: dayOfWeek,
    type: info.isDeload ? "deload" : "workout",
    title: getWorkoutTitle(dayOfWeek) + (info.isDeload ? " (Deload)" : ""),
    exercises: exercises,
    nutrition: {
      macros: nutMacros,
      meals: meals.meals
    },
    supplements: SUPPLEMENTS_DAILY,
    isDeload: info.isDeload
  };
}

function getWeekData(weekNum) {
  const days = [];
  for (let d = 0; d < 7; d++) {
    days.push(getDayData(weekNum, d));
  }
  return { week: weekNum, days };
}

// ===== APP STATE =====

const STORAGE_KEY = "bls40_progress";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { exercises: {}, meals: {}, supplements: {}, days: {}, sets: {}, rpe: {} };
  } catch { return { exercises: {}, meals: {}, supplements: {}, days: {}, sets: {}, rpe: {} }; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function getStorage() {
  const p = loadProgress();
  if (!p.sets) p.sets = {};
  if (!p.rpe) p.rpe = {};
  return p;
}

// ===== IMPORT / EXPORT =====

function exportData() {
  const p = loadProgress();
  const blob = new Blob([JSON.stringify(p, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `bls40-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("Progress saved to file");
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.exercises || !data.days) {
        showToast("Invalid save file — missing required fields", true);
        return;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showToast("Progress restored! Refreshing...");
      setTimeout(() => location.reload(), 800);
    } catch(err) {
      showToast("Could not read save file: " + err.message, true);
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isError ? "var(--red)" : "var(--green)";
  t.style.color = isError ? "var(--red)" : "var(--green)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ===== SUPPLEMENTS GUIDE =====

function showSupplementsGuide() {
  const panel = document.getElementById("guidePanel");
  const overlay = document.getElementById("guideOverlay");
  const body = document.getElementById("guideBody");

  body.innerHTML = SUPPLEMENTS_GUIDE.map(s => `
    <div class="guide-card">
      <div class="guide-category">${s.category}</div>
      <h3>${s.name}</h3>
      <span class="dose-badge">${s.dose}</span>
      <div class="guide-section-title">What it is</div>
      <p>${s.what}</p>
      <div class="guide-section-title">How it works</div>
      <p>${s.mechanism}</p>
      <div class="guide-section-title">When & how to take it</div>
      <p>${s.timing}</p>
      <div class="guide-note">${s.note}</div>
    </div>
  `).join("");

  panel.classList.add("show");
  overlay.classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeSupplementsGuide() {
  document.getElementById("guidePanel").classList.remove("show");
  document.getElementById("guideOverlay").classList.remove("show");
  document.body.style.overflow = "";
}

// ===== RENDER =====

let currentWeek = 1;

function makeId(prefix, ...parts) {
  return prefix + "_" + parts.join("_").replace(/[^a-z0-9]/gi, "_");
}

function render() {
  const p = getStorage();

  // Header phase badge
  const info = getPhaseForWeek(currentWeek);
  const phaseLabel = getPhaseLabel(info.phase);
  const badge = document.getElementById("headerPhaseBadge");
  badge.textContent = phaseLabel + (info.isDeload ? " — Deload" : "");

  // Week nav
  const nav = document.getElementById("weekNav");
  nav.innerHTML = "";
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const btn = document.createElement("button");
    const wi = getPhaseForWeek(w);
    let cls = "week-btn" + (w === currentWeek ? " active" : "");
    if (wi.isDeload) cls += " deload";
    btn.className = cls;
    let allDone = true;
    for (let d = 0; d < 7; d++) {
      const dayKey = makeId("day", w, d);
      if (!p.days[dayKey]) { allDone = false; break; }
    }
    if (allDone) btn.className = cls + " completed";
    btn.textContent = "W" + w;
    btn.onclick = () => { currentWeek = w; render(); };
    nav.appendChild(btn);
  }

  const content = document.getElementById("weekContent");
  content.innerHTML = "";

  const week = getWeekData(currentWeek);

  // Phase info banner
  const phaseInfo = getPhaseForWeek(currentWeek);
  const phaseNames = {1: "Phase 1 — Cut (4-6 rep range, Bench/Deadlift focus)", 2: "Phase 2 — Cut (Exercise rotation, Front Squats + Bulgarian Split Squats)", 3: "Phase 3 — Bulk (Standing OHP, Barbell Row return)", 4: "Phase 4 — Bulk (Arnold Press, new exercises)"};
  const phaseLabelDiv = document.createElement("div");
  phaseLabelDiv.style.cssText = "text-align:center;margin-bottom:12px;font-size:0.85em;color:var(--text-dim);padding:8px;background:var(--card);border-radius:8px;border:1px solid var(--border);";
  phaseLabelDiv.innerHTML = phaseInfo.isDeload
    ? `<strong>Deload Week</strong> &mdash; 2 sets of 2 reps on compounds, 2 sets of 4 reps on accessories. Reduce intensity, keep form sharp.`
    : `<strong>${phaseNames[phaseInfo.phase] || "Phase " + phaseInfo.phase}</strong>`;
  content.appendChild(phaseLabelDiv);

  // Nutrition banner
  const nutPhase = isCutWeek(currentWeek) ? "<span style='color:var(--green)'>Cut</span>" : "<span style='color:var(--orange)'>Bulk (Lean Gain)</span>";
  const nutInfo = isCutWeek(currentWeek) ? CUT_MEALS : BULK_MEALS;
  const nutNote = document.createElement("div");
  nutNote.style.cssText = "text-align:center;margin-bottom:12px;font-size:0.8em;color:var(--text-dim);padding:6px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border);";
  nutNote.innerHTML = `Meal Plan: ${nutPhase} &mdash; ${nutInfo.macros.cals} cal &bull; P${nutInfo.macros.protein}g &bull; C${nutInfo.macros.carbs}g &bull; F${nutInfo.macros.fat}g`;
  content.appendChild(nutNote);

  for (const day of week.days) {
    const card = document.createElement("div");
    const dayKey = makeId("day", currentWeek, day.dayOfWeek);
    let cardCls = "day-card" + (p.days[dayKey] ? " completed-day" : "");
    if (day.type === "rest") cardCls += " rest-day";
    if (day.type === "deload") cardCls += " deload-day";
    card.className = cardCls;

    const hdr = document.createElement("div");
    hdr.className = "day-header";
    const typeLabel = day.type === "rest" ? "REST" : day.type === "deload" ? "DELOAD" : "WORKOUT";
    const typeCls = day.type === "rest" ? "rest" : day.type === "deload" ? "deload" : "workout";
    hdr.innerHTML = `
      <div>
        <h2>${day.dayName} — ${day.title}</h2>
      </div>
      <div>
        <span class="day-type ${typeCls}">${typeLabel}</span>
        <span class="day-check ${p.days[dayKey] ? "checked" : ""}" data-key="${dayKey}" data-type="day">${p.days[dayKey] ? "✓" : "○"}</span>
      </div>
    `;
    card.appendChild(hdr);

    // Exercises
    if (day.exercises.length > 0) {
      const sec = document.createElement("div");
      sec.className = "section";
      const secTitle = document.createElement("div");
      secTitle.className = "section-title";
      secTitle.textContent = "Exercises";
      sec.appendChild(secTitle);

      if (day.exercises.some(e => e.warmup) && !day.isDeload) {
        const warmNote = document.createElement("div");
        warmNote.style.cssText = "font-size:0.78em;color:var(--orange);margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);";
        warmNote.innerHTML = "Warm-up: 12 reps @50% &bull; 10 reps @50% &bull; 4 reps @70% &bull; 1 rep @90% &bull; Then working sets";
        sec.appendChild(warmNote);
      }

      if (day.isDeload) {
        const deloadNote = document.createElement("div");
        deloadNote.style.cssText = "font-size:0.78em;color:var(--orange);margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);";
        deloadNote.innerHTML = "Deload: 2 sets of 2 reps on compounds, 2 sets of 4 reps on accessories. Reduce weight 20-30% from working sets.";
        sec.appendChild(deloadNote);
      }

      day.exercises.forEach(ex => {
        const item = document.createElement("div");
        item.className = "exercise-item";
        const exKey = makeId("ex", currentWeek, day.dayOfWeek, ex.name.replace(/[^a-z0-9]/gi, "_"));

        // Build set log HTML
        let setLogHtml = "";
        if (ex.numSets) {
          setLogHtml = '<div class="set-log">';
          for (let s = 0; s < ex.numSets; s++) {
            const setKey = makeId("set", currentWeek, day.dayOfWeek, ex.name.replace(/[^a-z0-9]/gi, "_"), s);
            const saved = p.sets[setKey] || {};
            setLogHtml += `
              <div class="set-block">
                <span class="set-row-label">S${s+1}</span>
                <input class="set-input" type="number" min="0" step="1.25" placeholder="kg"
                  value="${saved.weight || ""}" data-setkey="${setKey}" data-field="weight"
                  onchange="handleSetInput(this)">
                <span class="set-x">×</span>
                <input class="set-input" type="number" min="0" step="1" placeholder="rep"
                  value="${saved.reps || ""}" data-setkey="${setKey}" data-field="reps"
                  onchange="handleSetInput(this)">
              </div>
            `;
          }
          setLogHtml += '</div>';
        }

        // Build RPE / traffic light HTML
        const rpeKey = makeId("rpe", currentWeek, day.dayOfWeek, ex.name.replace(/[^a-z0-9]/gi, "_"));
        const rpeVal = p.rpe[rpeKey] || "";
        const rpeHtml = `
          <div class="rpe-row">
            <span class="rpe-label">Intensity:</span>
            <span class="rpe-dot easy ${rpeVal === "easy" ? "selected" : ""}" onclick="handleRpe('${rpeKey}','easy',this)">EZ</span>
            <span class="rpe-dot medium ${rpeVal === "medium" ? "selected" : ""}" onclick="handleRpe('${rpeKey}','medium',this)">OK</span>
            <span class="rpe-dot hard ${rpeVal === "hard" ? "selected" : ""}" onclick="handleRpe('${rpeKey}','hard',this)">HD</span>
          </div>
        `;

        item.innerHTML = `
          <div class="exercise-header">
            <div>
              <div class="exercise-name">${ex.name}</div>
              <div class="exercise-specs">${ex.numSets} x ${ex.reps} &bull; Rest ${ex.rest}</div>
            </div>
            <span class="exercise-check ${p.exercises[exKey] ? "checked" : ""}" data-key="${exKey}" data-type="exercise">${p.exercises[exKey] ? "✓" : "○"}</span>
          </div>
          ${setLogHtml}
          ${rpeHtml}
          <span class="desc-toggle" data-ex="${ex.name}">Show description &raquo;</span>
          <div class="exercise-desc" data-ex="${ex.name}">
            ${EXERCISES[ex.name] ? EXERCISES[ex.name].desc : "Perform with proper form: controlled negative, explosive positive. Full range of motion."}
            ${EXERCISES[ex.name] && EXERCISES[ex.name].img
              ? `<br><a href="${EXERCISES[ex.name].img}" target="_blank">View: ${EXERCISES[ex.name].imgLabel}</a>`
              : ""}
          </div>
        `;
        sec.appendChild(item);
      });
      card.appendChild(sec);
    }

    // Nutrition
    if (day.nutrition) {
      const sec = document.createElement("div");
      sec.className = "section";
      const mealPhaseName = isCutWeek(currentWeek) ? "Cut" : "Bulk (Lean Gain)";
      sec.innerHTML = `<div class="section-title">Nutrition — ${mealPhaseName} (${day.nutrition.macros.cals} cal/day)</div>`;
      const macroRow = document.createElement("div");
      macroRow.className = "macro-row";
      macroRow.innerHTML = `
        <span class="macro-pill">Protein <span class="val">${day.nutrition.macros.protein}g</span></span>
        <span class="macro-pill">Carbs <span class="val">${day.nutrition.macros.carbs}g</span></span>
        <span class="macro-pill">Fat <span class="val">${day.nutrition.macros.fat}g</span></span>
        <span class="macro-pill">Calories <span class="val">${day.nutrition.macros.cals}</span></span>
      `;
      sec.appendChild(macroRow);

      const mealList = document.createElement("ul");
      mealList.className = "meal-list";

      day.nutrition.meals.forEach((meal, i) => {
        const mealKey = makeId("meal", currentWeek, day.dayOfWeek, i);
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="meal-check ${p.meals[mealKey] ? "checked" : ""}" data-key="${mealKey}" data-type="meal">${p.meals[mealKey] ? "✓" : "○"}</span>
          <span class="meal-name"><strong>${meal.name}</strong>: ${meal.items}</span>
          <span class="meal-cal">${meal.detail}</span>
        `;
        mealList.appendChild(li);
      });

      sec.appendChild(mealList);
      card.appendChild(sec);
    }

    // Supplements
    if (day.supplements.length > 0) {
      const sec = document.createElement("div");
      sec.className = "section";
      sec.innerHTML = `<div class="section-title">Supplements</div>`;
      day.supplements.forEach(s => {
        const suppKey = makeId("supp", currentWeek, day.dayOfWeek, s.name.replace(/[^a-z0-9]/gi, "_"));
        const div = document.createElement("div");
        div.className = "supplement-item";
        div.innerHTML = `
          <span class="check ${p.supplements[suppKey] ? "checked" : ""}" data-key="${suppKey}" data-type="supplement">${p.supplements[suppKey] ? "✓" : "○"}</span>
          <span><strong>${s.name}</strong> — ${s.dose}</span>
        `;
        sec.appendChild(div);
      });

      if (day.type === "workout" || day.type === "deload") {
        const note = document.createElement("div");
        note.style.cssText = "font-size:0.78em;color:var(--text-dim);margin-top:6px;padding:6px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);";
        note.innerHTML = "Take creatine with post-workout meal (protein + carbs). No need to cycle — 5g daily.";
        sec.appendChild(note);
      }
      card.appendChild(sec);
    }

    content.appendChild(card);
  }

  updateStats(p);
  attachListeners();
}

// ===== SET & RPE HANDLERS =====

function handleSetInput(input) {
  const p = getStorage();
  const setKey = input.dataset.setkey;
  const field = input.dataset.field;
  if (!p.sets) p.sets = {};
  if (!p.sets[setKey]) p.sets[setKey] = {};
  const val = input.value.trim();
  p.sets[setKey][field] = val ? parseFloat(val) : "";
  saveProgress(p);
}

function handleRpe(rpeKey, value, el) {
  const p = getStorage();
  if (!p.rpe) p.rpe = {};
  if (p.rpe[rpeKey] === value) {
    delete p.rpe[rpeKey];
  } else {
    p.rpe[rpeKey] = value;
  }
  saveProgress(p);
  const parent = el.parentElement;
  parent.querySelectorAll(".rpe-dot").forEach(d => d.classList.remove("selected"));
  if (p.rpe[rpeKey]) {
    parent.querySelector(`.rpe-dot.${p.rpe[rpeKey]}`).classList.add("selected");
  }
}

// ===== STATS =====

function updateStats(p) {
  const allKeys = new Set();

  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const week = getWeekData(w);
    for (const day of week.days) {
      allKeys.add(makeId("day", w, day.dayOfWeek));
      for (const ex of day.exercises) {
        allKeys.add(makeId("ex", w, day.dayOfWeek, ex.name.replace(/[^a-z0-9]/gi, "_")));
      }
      if (day.nutrition) {
        day.nutrition.meals.forEach((_, i) => {
          allKeys.add(makeId("meal", w, day.dayOfWeek, i));
        });
      }
      day.supplements.forEach(s => {
        allKeys.add(makeId("supp", w, day.dayOfWeek, s.name.replace(/[^a-z0-9]/gi, "_")));
      });
    }
  }

  let doneCount = 0;
  for (const key of allKeys) {
    if (p.exercises[key] || p.meals[key] || p.supplements[key] || p.days[key]) {
      doneCount++;
    }
  }

  const pct = allKeys.size > 0 ? Math.round(doneCount / allKeys.size * 100) : 0;
  document.getElementById("statPct").textContent = pct + "%";
  document.getElementById("statDays").textContent = doneCount + "/" + allKeys.size;

  let streak = 0;
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    let allDaysDone = true;
    for (let d = 0; d < 7; d++) {
      if (!p.days[makeId("day", w, d)]) { allDaysDone = false; break; }
    }
    if (allDaysDone) streak++; else break;
  }
  document.getElementById("statStreak").textContent = streak;
}

// ===== EVENT LISTENERS =====

function attachListeners() {
  document.querySelectorAll("[data-type]").forEach(el => {
    el.removeEventListener("click", handleCheck);
    el.addEventListener("click", handleCheck);
  });

  document.querySelectorAll(".desc-toggle").forEach(el => {
    el.removeEventListener("click", handleDescToggle);
    el.addEventListener("click", handleDescToggle);
  });
}

function handleCheck(e) {
  const el = e.currentTarget;
  const key = el.dataset.key;
  const type = el.dataset.type;
  const p = getStorage();

  let target;
  if (type === "exercise") target = p.exercises;
  else if (type === "meal") target = p.meals;
  else if (type === "supplement") target = p.supplements;
  else target = p.days;

  target[key] = !target[key];
  saveProgress(p);

  el.classList.toggle("checked");
  el.textContent = target[key] ? "✓" : "○";

  if (type === "day") {
    const card = el.closest(".day-card");
    if (card) card.classList.toggle("completed-day");
  }

  updateStats(p);
}

function handleDescToggle(e) {
  const exName = e.currentTarget.dataset.ex;
  const desc = document.querySelector(`.exercise-desc[data-ex="${CSS.escape(exName)}"]`);
  if (desc) {
    desc.classList.toggle("show");
    e.currentTarget.innerHTML = desc.classList.contains("show") ? "Hide description &raquo;" : "Show description &raquo;";
  }
}

// Image lightbox
document.addEventListener("click", function(e) {
  if (e.target.tagName === "A" && e.target.href && e.target.href.includes("images/")) {
    e.preventDefault();
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;";
    const img = document.createElement("img");
    img.src = e.target.href;
    img.style.cssText = "max-width:95%;max-height:95%;border-radius:8px;";
    overlay.appendChild(img);
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
  }
});

render();
</script>
